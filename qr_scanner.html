<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>出席チェック</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; }
  .header { background: #16213e; padding: 16px; text-align: center; }
  .header h1 { font-size: 20px; }
  .header a { color: #4fc3f7; font-size: 14px; display: block; margin-top: 6px; }

  #vc { position: relative; width: 100%; max-width: 400px; margin: 20px auto; }
  video { width: 100%; border-radius: 12px; display: block; }
  .overlay {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 200px; height: 200px;
    border: 3px solid #4fc3f7; border-radius: 12px;
    display: none;
  }

  #startWrap { text-align: center; margin: 24px 16px; }
  #startBtn {
    background: #4fc3f7; color: #000; border: none; border-radius: 12px;
    padding: 18px 40px; font-size: 20px; font-weight: bold;
    cursor: pointer; width: 100%; max-width: 400px;
  }
  #startBtn:disabled { background: #888; }

  #result {
    max-width: 400px; margin: 16px auto; padding: 20px;
    border-radius: 12px; text-align: center;
    font-size: 22px; font-weight: bold; display: none;
  }
  .ok       { background: #1b5e20; border: 2px solid #4caf50; }
  .already  { background: #e65100; border: 2px solid #ff9800; }
  .notfound { background: #b71c1c; border: 2px solid #f44336; }
  .sub { font-size: 15px; margin-top: 8px; font-weight: normal; opacity: .85; }

  .stats {
    max-width: 400px; margin: 16px auto;
    background: #16213e; padding: 16px;
    border-radius: 12px; text-align: center;
  }
  .big-num { font-size: 48px; font-weight: bold; color: #4fc3f7; }

  #listArea { max-width: 400px; margin: 0 auto 24px; display: none; }
  #listArea h2 { font-size: 16px; margin-bottom: 8px; color: #4fc3f7; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #16213e; padding: 8px; text-align: left; }
  td { padding: 8px; border-bottom: 1px solid #333; }
  #toggleList { color: #4fc3f7; font-size: 13px; background: none; border: none; cursor: pointer; margin-top: 8px; }
</style>
</head>
<body>

<div class="header">
  <h1>📷 出席チェック</h1>
</div>

<div id="vc">
  <video id="video" autoplay playsinline muted></video>
  <div class="overlay" id="overlay"></div>
</div>

<div id="startWrap">
  <button id="startBtn" onclick="startCamera()">📷 カメラを起動する</button>
</div>

<div id="result"></div>

<div class="stats">
  <div class="big-num" id="count">-</div>
  <div>名 出席済み</div>
  <button id="toggleList" onclick="toggleList()">▼ 出席者一覧を表示</button>
</div>

<div id="listArea">
  <h2>📋 出席者一覧</h2>
  <table>
    <thead><tr><th>時刻</th><th>氏名</th><th>所属</th></tr></thead>
    <tbody id="listBody"></tbody>
  </table>
</div>

<!-- GASのWebアプリURL：ここに実際のURLが入ります -->
<script>
  // ★ GAS WebアプリのURL
  var GAS_URL = "https://script.google.com/macros/s/AKfycbwsZxZy4EjcsXCprIeixnEqSS8im_7ZdsF56s7VNcHTQkuGUBOj-bHq_Jm4ZJbQRHfX/exec";

  var video   = document.getElementById("video");
  var result  = document.getElementById("result");
  var countEl = document.getElementById("count");
  var scanning = false, lastId = "";

  // ---------- カメラ起動 ----------
  function startCamera() {
    var btn = document.getElementById("startBtn");
    btn.textContent = "起動中...";
    btn.disabled = true;

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
      .then(function(stream) {
        video.srcObject = stream;
        document.getElementById("startWrap").style.display = "none";
        document.getElementById("overlay").style.display = "block";
        scanning = true;
        startScan();
        updateCount();
      })
      .catch(function(err) {
        btn.textContent = "📷 カメラを起動する";
        btn.disabled = false;
        alert("カメラを起動できませんでした。\nブラウザの設定でカメラを許可してからもう一度タップしてください。\n\nエラー: " + err.message);
      });
  }

  // ---------- QRスキャンループ ----------
  function startScan() {
    var canvas = document.createElement("canvas");
    var ctx    = canvas.getContext("2d");
    (function loop() {
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        var code    = jsQR(imgData.data, imgData.width, imgData.height);
        if (code && scanning && code.data !== lastId) {
          lastId   = code.data;
          scanning = false;
          doCheckIn(code.data);
        }
      }
      requestAnimationFrame(loop);
    })();
  }

  // ---------- チェックイン ----------
  function doCheckIn(id) {
    fetch(GAS_URL + "?action=checkin&id=" + encodeURIComponent(id))
      .then(function(r) { return r.json(); })
      .then(function(r) {
        showResult(r);
        updateCount();
        setTimeout(function() {
          scanning = true;
          lastId   = "";
          result.style.display = "none";
        }, 4000);
      })
      .catch(function(e) {
        showError("通信エラー: " + e.message);
      });
  }

  // ---------- 結果表示 ----------
  function showResult(r) {
    result.style.display = "block";
    if (r.status === "ok") {
      result.className = "ok";
      result.innerHTML = "✅ " + r.name + " 様"
        + "<div class='sub'>" + (r.affiliation || "") + "<br>チェックイン完了！</div>";
    } else if (r.status === "already") {
      result.className = "already";
      result.innerHTML = "⚠️ " + r.name + " 様"
        + "<div class='sub'>すでにチェックイン済みです</div>";
    } else {
      result.className = "notfound";
      result.innerHTML = "❌ 登録が見つかりません"
        + "<div class='sub'>QRコードを確認してください</div>";
    }
  }

  function showError(msg) {
    result.style.display = "block";
    result.className = "notfound";
    result.innerHTML = "❌ " + msg;
    setTimeout(function() {
      scanning = true; lastId = ""; result.style.display = "none";
    }, 4000);
  }

  // ---------- 出席カウント更新 ----------
  function updateCount() {
    fetch(GAS_URL + "?action=stats")
      .then(function(r) { return r.json(); })
      .then(function(r) {
        countEl.textContent = r.attended + " / " + r.total;
        // 一覧更新
        var tbody = document.getElementById("listBody");
        tbody.innerHTML = "";
        (r.attendees || []).forEach(function(a) {
          var tr = document.createElement("tr");
          tr.innerHTML = "<td>" + a.time + "</td><td>" + a.name + "</td><td>" + (a.affiliation || "") + "</td>";
          tbody.appendChild(tr);
        });
      })
      .catch(function() {});
  }

  // ---------- 一覧の開閉 ----------
  function toggleList() {
    var area = document.getElementById("listArea");
    var btn  = document.getElementById("toggleList");
    if (area.style.display === "none") {
      area.style.display = "block";
      btn.textContent = "▲ 出席者一覧を隠す";
      updateCount();
    } else {
      area.style.display = "none";
      btn.textContent = "▼ 出席者一覧を表示";
    }
  }

  setInterval(updateCount, 30000);
</script>

<script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
</body>
</html>
